<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>PMP Safe Writer</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#52b5df;color:#101827;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.wrap{max-width:820px;margin:auto;padding:18px}.card{background:#46a9d3;border:2px solid #fff;border-radius:28px;padding:18px;margin:0 0 16px;box-shadow:0 12px 28px #0002}h1{margin:0 0 10px;font-size:32px}.sub{font-weight:800;color:#234a5d;line-height:1.35}.warn{background:#2b2010;border:2px solid #745522;color:#ffe0a3;border-radius:22px;padding:16px;white-space:pre-wrap}.note{background:#123024;border:2px solid #fff;color:#c9f7d7;border-radius:22px;padding:16px;white-space:pre-wrap}input,textarea{width:100%;border:1px solid #25354a;border-radius:16px;background:#0c141e;color:#eef4fb;padding:13px;font:inherit;margin-top:10px}button{width:100%;border:0;border-radius:20px;padding:16px;margin:10px 0;background:#a1fcfd;color:#101827;text-align:center;font:inherit;font-weight:900;font-size:17px}.mini{background:#172234;color:#eef4fb;border:1px solid #25354a;border-radius:14px;padding:14px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}textarea{min-height:280px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <div class="card"><h1>PMP Safe Writer</h1><p class="sub">Protected writer for pmp.html. Same safety layer, simpler button logic.</p><div class="warn">Commit is blocked unless the box contains a full HTML app.</div></div>
  <div class="card"><h2>Connection</h2><input id="token" type="password" placeholder="Paste GitHub token"><input id="repo" value="pmpbird/pmp-bridge-shell"><input id="branch" value="main"><input id="path" value="pmp.html"><input id="sha" readonly placeholder="file SHA"><div class="grid"><button class="mini" id="testBtn">Test</button><button class="mini" id="fetchBtn">Fetch App</button></div></div>
  <div class="card"><h2>Safety</h2><div class="grid"><button class="mini" id="saveGoodBtn">Save Current As Good</button><button class="mini" id="restoreGoodBtn">Restore Local Good</button><button class="mini" id="copyBackupBtn">Copy Emergency Backup</button><button class="mini" id="guardBtn">Run Guard</button></div><div id="guard" class="note">Guard not run yet.</div></div>
  <div class="card"><h2>Protected Patches</h2><p class="sub">Use these only after Fetch App.</p><button id="patchSafetyBtn">Add Safety Hub Link to Control Room</button><button id="patchRhythmBtn">Add / Clean Exact Rhythm Gate</button><button id="patchRefreshBtn">Add Refresh Latest App to Control Room</button></div>
  <div class="card"><h2>Commit</h2><input id="msg" value="Safe writer update"><textarea id="box" placeholder="Fetch full app first. Then edit the full file here."></textarea><button id="commitBtn">Commit Full App Only</button><div id="status" class="note">Loading Safe Writer...</div></div>
</div>
<script>
(function(){
  var GOOD='pmp_safe_writer_last_good_v1';
  function el(id){return document.getElementById(id)}
  function status(m){el('status').textContent=m}
  function guardMsg(m){el('guard').textContent=m}
  function now(){return new Date().toISOString()}
  function getToken(){var t=el('token').value.trim(); if(!t) throw new Error('Paste token first.'); return t}
  function parts(){var bits=el('repo').value.trim().split('/'); return {owner:bits[0],repo:bits[1],branch:el('branch').value.trim(),path:el('path').value.trim()}}
  function fileUrl(){var p=parts(); return 'https://api.github.com/repos/'+encodeURIComponent(p.owner)+'/'+encodeURIComponent(p.repo)+'/contents/'+p.path.split('/').map(encodeURIComponent).join('/')}
  function headers(){return {Authorization:'Bearer '+getToken(),Accept:'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'}}
  function dec64(s){return new TextDecoder().decode(Uint8Array.from(atob(String(s||'').replace(/\n/g,'')),function(c){return c.charCodeAt(0)}))}
  function enc64(s){return btoa(Array.from(new TextEncoder().encode(s)).map(function(x){return String.fromCharCode(x)}).join(''))}
  async function getFile(ref){var r=await fetch(fileUrl()+'?ref='+encodeURIComponent(ref),{headers:headers(),cache:'no-store'}); var j=await r.json().catch(function(){return {}}); if(!r.ok) throw new Error(j.message||'Fetch failed'); return j}
  function fullHtmlGuard(txt){txt=String(txt||'').trim(); var lower=txt.toLowerCase(); return lower.indexOf('<!doctype html')===0 && lower.indexOf('<html')>-1 && lower.indexOf('<head')>-1 && lower.indexOf('<body')>-1 && lower.lastIndexOf('</html>')===lower.length-7 && txt.length>5000}
  function runGuard(){var ok=fullHtmlGuard(el('box').value); guardMsg(ok?'PASS: full app HTML detected.':'BLOCKED: this does not look like a full app file. Do not commit.'); return ok}

  async function testToken(){try{status('Testing...'); var p=parts(); var j=await getFile(p.branch); el('sha').value=j.sha||''; status('Token works. File found.')}catch(e){status('Test failed: '+e.message)}}
  async function fetchApp(){try{status('Fetching current app...'); var p=parts(); var j=await getFile(p.branch); var txt=dec64(j.content); el('sha').value=j.sha||''; el('box').value=txt; localStorage.setItem(GOOD,JSON.stringify({saved_at:now(),sha:j.sha,content:txt})); runGuard(); status('Fetched app and saved current as local last-good.')}catch(e){status('Fetch failed: '+e.message)}}
  function saveCurrentAsGood(){var txt=el('box').value; if(!fullHtmlGuard(txt)) return status('Save blocked: box does not contain a full app.'); localStorage.setItem(GOOD,JSON.stringify({saved_at:now(),sha:el('sha').value,content:txt})); status('Current box saved as local last-good.')}
  function restoreLocalGood(){var g=null; try{g=JSON.parse(localStorage.getItem(GOOD)||'null')}catch(e){} if(!g||!g.content) return status('No local last-good saved.'); el('box').value=g.content; runGuard(); status('Local last-good restored into box. Review, then commit if needed.')}
  async function copyEmergencyBackup(){await navigator.clipboard.writeText(localStorage.getItem(GOOD)||''); status('Emergency backup copied.')}

  function patchSafetyLink(){var txt=el('box').value; if(!fullHtmlGuard(txt)) return status('Patch blocked: fetch the full app first.'); if(txt.indexOf('safety.html')>-1 && txt.indexOf('Open Safety Hub')>-1){status('Safety Hub link is already present.'); runGuard(); return} var marker='<button class="mini" onclick="go(\'system\')">Open Private System</button>'; if(txt.indexOf(marker)<0) return status('Patch blocked: Control Room marker not found.'); var add=marker+'<button class="mini" onclick="location.href=\'safety.html\'">Open Safety Hub</button>'; txt=txt.replace(marker,add); el('box').value=txt; el('msg').value='Add Safety Hub link to Control Room'; runGuard(); status('Safety Hub link added. Review, then commit.')}

  function rhythmGateCode(){
    return [
      '',
      'const PMP_GATE_INTERVALS=[\'L\',\'L\',\'S\',\'S\',\'S\',\'L\',\'S\',\'L\',\'S\',\'S\',\'S\'];',
      'let pmpGateTimes=[];',
      'function pmpGateTap(e){',
      '  e.preventDefault(); e.stopPropagation();',
      '  let t=Date.now();',
      '  if(pmpGateTimes.length&&t-pmpGateTimes[pmpGateTimes.length-1]>1600)pmpGateTimes=[];',
      '  pmpGateTimes.push(t);',
      '  if(navigator.vibrate)navigator.vibrate(12);',
      '  if(pmpGateTimes.length>12)pmpGateTimes.shift();',
      '  if(pmpGateTimes.length===12){',
      '    let gaps=[];',
      '    for(let i=1;i<pmpGateTimes.length;i++)gaps.push(pmpGateTimes[i]-pmpGateTimes[i-1]);',
      '    let min=Math.min(...gaps), max=Math.max(...gaps), cut=(min+max)/2;',
      '    let got=gaps.map(g=>g>cut?\'L\':\'S\');',
      '    let ok=max/min>1.35&&got.every((x,i)=>x===PMP_GATE_INTERVALS[i]);',
      '    if(ok){pmpGateTimes=[]; if(navigator.vibrate)navigator.vibrate([40,35,40,35,120]); if(typeof lockPrivate===\'function\')lockPrivate(); if(typeof go===\'function\')go(\'system\');}',
      '    else if(navigator.vibrate)navigator.vibrate([20,80,20]);',
      '  }',
      '}',
      'function pmpInstallRhythmGate(){let el=document.getElementById(\'controlTitle\'); if(el){if(typeof titleTap===\'function\')el.removeEventListener(\'click\',titleTap,true); if(!el.dataset.pmpRhythmGate){el.dataset.pmpRhythmGate=\'on\'; el.addEventListener(\'click\',pmpGateTap,true);}}}',
      'pmpInstallRhythmGate(); setTimeout(pmpInstallRhythmGate,0); setTimeout(pmpInstallRhythmGate,250);',
      ''
    ].join('\n');
  }

  function cleanOldSevenTapControlListener(txt){
    var before=txt;
    txt=txt.replace(/if\(\$\('controlTitle'\)\)\$\('controlTitle'\)\.addEventListener\('click',titleTap,true\);/g,'');
    txt=txt.replace(/if\(\$\("controlTitle"\)\)\$\("controlTitle"\)\.addEventListener\("click",titleTap,true\);/g,'');
    txt=txt.replace(/document\.getElementById\('controlTitle'\)\.addEventListener\('click',titleTap,true\);/g,'');
    txt=txt.replace(/document\.getElementById\("controlTitle"\)\.addEventListener\("click",titleTap,true\);/g,'');
    txt=txt.replace(/if\(\$\('controlTitle'\)\)\$\('controlTitle'\)\.removeEventListener\('click',titleTap,true\);/g,'');
    return {txt:txt,changed:txt!==before};
  }

  function upgradeExistingGateCode(txt){
    var before=txt;
    txt=txt.replace(/function pmpInstallRhythmGate\(\)\{let el=document\.getElementById\('controlTitle'\); if\(el&&!el\.dataset\.pmpRhythmGate\)\{el\.dataset\.pmpRhythmGate='on'; el\.addEventListener\('click',pmpGateTap,true\);\}\}/g,
      "function pmpInstallRhythmGate(){let el=document.getElementById('controlTitle'); if(el){if(typeof titleTap==='function')el.removeEventListener('click',titleTap,true); if(!el.dataset.pmpRhythmGate){el.dataset.pmpRhythmGate='on'; el.addEventListener('click',pmpGateTap,true);}}}");
    if(txt.indexOf('pmpInstallRhythmGate(); setTimeout(pmpInstallRhythmGate,0); setTimeout(pmpInstallRhythmGate,250);')<0){
      txt=txt.replace('pmpInstallRhythmGate(); setTimeout(pmpInstallRhythmGate,0);','pmpInstallRhythmGate(); setTimeout(pmpInstallRhythmGate,0); setTimeout(pmpInstallRhythmGate,250);');
    }
    return {txt:txt,changed:txt!==before};
  }

  function patchExactRhythmGate(){
    var txt=el('box').value; if(!fullHtmlGuard(txt)) return status('Patch blocked: fetch the full app first.');
    var removed=0, installed=false, cleaned=false, upgraded=false;
    if(txt.indexOf('<h1>Control Room</h1>')>-1) txt=txt.replace('<h1>Control Room</h1>','<h1 id="controlTitle">Control Room</h1>');
    else if(txt.indexOf('id="controlTitle"')<0) return status('Patch blocked: Control Room title marker not found.');
    txt=txt.replace(/<button class="mini" onclick="go\('system'\)">Open Private System<\/button>/g,function(){removed++;return ''});
    txt=txt.replace(/<button class="mini" onclick="go\('system'\)">Private System<\/button>/g,function(){removed++;return ''});
    var clean=cleanOldSevenTapControlListener(txt); txt=clean.txt; cleaned=clean.changed;
    if(txt.indexOf('PMP_GATE_INTERVALS')<0){var closeTag='<'+'/script>'; var pos=txt.lastIndexOf(closeTag); if(pos<0) return status('Patch blocked: final script close not found.'); txt=txt.slice(0,pos)+rhythmGateCode()+txt.slice(pos); installed=true;}
    else {var up=upgradeExistingGateCode(txt); txt=up.txt; upgraded=up.changed;}
    el('box').value=txt; el('msg').value='Clean exact Control Room rhythm gate'; runGuard(); status('Rhythm gate ready. Installed: '+(installed?'yes':'already')+'. Active old-listener detach: '+(installed||upgraded?'yes':'already')+'. Removed old 7-tap Control Room code: '+(cleaned?'yes':'no')+'. Removed visible private buttons: '+removed+'. Review, then commit.');
  }

  function refreshLatestCode(){
    return [
      '',
      'var PMP_APP_BUILD_VERSION=\'2026-05-02-refresh-latest-v1\';',
      'function refreshLatestApp(){let base=location.origin+location.pathname;location.href=base+\'?v=\'+Date.now();}',
      'function showAppVersion(){let x=$(\'appVersionText\');if(x)x.textContent=PMP_APP_BUILD_VERSION;}',
      'showAppVersion(); setTimeout(showAppVersion,0);',
      ''
    ].join('\n');
  }

  function patchRefreshLatest(){
    var txt=el('box').value; if(!fullHtmlGuard(txt)) return status('Patch blocked: fetch the full app first.');
    if(txt.indexOf('refreshLatestApp')>-1 && txt.indexOf('App Version:')>-1){status('Refresh Latest App already appears installed.'); runGuard(); return}
    var ui='<button class="mini" onclick="refreshLatestApp()">Refresh Latest App</button><div id="appVersionBox" class="note" style="margin-top:10px">App Version: <span id="appVersionText">loading</span></div>';
    var safety='<button class="mini" onclick="location.href=\'safety.html\'">Open Safety Hub</button>';
    if(txt.indexOf(safety)>-1) txt=txt.replace(safety,safety+ui);
    else {
      var p='<p class="sub">App controls and status. No project meaning is decided here.</p>';
      if(txt.indexOf(p)<0) return status('Patch blocked: Control Room insertion point not found.');
      txt=txt.replace(p,p+ui);
    }
    var closeTag='<'+'/script>'; var pos=txt.lastIndexOf(closeTag); if(pos<0) return status('Patch blocked: final script close not found.');
    txt=txt.slice(0,pos)+refreshLatestCode()+txt.slice(pos);
    el('box').value=txt; el('msg').value='Add Refresh Latest App to Control Room'; runGuard(); status('Refresh Latest App and App Version added to Control Room. Review, then commit.');
  }

  async function commitSafe(){try{var txt=el('box').value; if(!runGuard()) throw new Error('Commit blocked by full-app guard.'); var sha=el('sha').value.trim(); var p=parts(); if(!sha){var j=await getFile(p.branch); sha=j.sha; el('sha').value=sha} localStorage.setItem(GOOD,JSON.stringify({saved_at:now(),sha:sha,content:txt})); status('Committing full app...'); var r=await fetch(fileUrl(),{method:'PUT',headers:Object.assign({},headers(),{'Content-Type':'application/json'}),body:JSON.stringify({message:el('msg').value||'Safe writer update',content:enc64(txt),sha:sha,branch:p.branch})}); var out=await r.json().catch(function(){return {}}); if(!r.ok) throw new Error(out.message||'Commit failed'); el('sha').value=(out.content&&out.content.sha)||''; status('Committed safely. Reload PMP app.')}catch(e){status('Commit failed: '+e.message)}}

  el('testBtn').addEventListener('click',testToken);
  el('fetchBtn').addEventListener('click',fetchApp);
  el('saveGoodBtn').addEventListener('click',saveCurrentAsGood);
  el('restoreGoodBtn').addEventListener('click',restoreLocalGood);
  el('copyBackupBtn').addEventListener('click',copyEmergencyBackup);
  el('guardBtn').addEventListener('click',runGuard);
  el('patchSafetyBtn').addEventListener('click',patchSafetyLink);
  el('patchRhythmBtn').addEventListener('click',patchExactRhythmGate);
  el('patchRefreshBtn').addEventListener('click',patchRefreshLatest);
  el('commitBtn').addEventListener('click',commitSafe);
  status('Safe Writer loaded. Buttons are active.');
})();
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>PMP Bridge</title>

<style>
body{margin:0;font-family:-apple-system;background:#0b1220;color:#fff}
.wrap{padding:16px}
.card{background:#111a2e;border-radius:16px;padding:16px;margin-bottom:12px}
button{width:100%;padding:14px;margin:8px 0;border:0;border-radius:12px;font-weight:700}
.primary{background:#4fd1c5;color:#000}
input,textarea{width:100%;padding:10px;margin:6px 0;border-radius:10px;border:1px solid #333;background:#000;color:#fff}
.note{background:#123024;padding:10px;border-radius:10px}
.warn{background:#402020;padding:10px;border-radius:10px}
</style>
</head>

<body>
<div class="wrap">

<div class="card">
<h1>PMP Bridge</h1>
<button class="primary" onclick="goSystem()">Open System</button>
</div>

<div id="system" style="display:none">

<div class="card">
<h2>System Lock</h2>
<input id="pass" type="password" placeholder="Password">
<button onclick="unlock()">Unlock</button>
<div id="lockStatus" class="note"></div>
</div>

<div id="systemBody" style="display:none">

<div class="card">
<h2>Private GitHub Writer</h2>

<input id="tok" type="password" placeholder="Paste token">
<button onclick="useToken()">Use Token</button>

<input id="repo" value="pmpbird/pmp-bridge-shell">
<input id="branch" value="main">
<input id="path" value="index.html">

<button onclick="fetchFile()">Fetch</button>
<button onclick="commitFile()">Commit</button>

<textarea id="fileBox" placeholder="File contents"></textarea>

<div id="status" class="note">Ready</div>
</div>

</div>
</div>

</div>

<script>
let unlocked=false
let TOKEN=''

function goSystem(){
document.getElementById('system').style.display='block'
}

function unlock(){
let p=document.getElementById('pass').value
if(!p)return
localStorage.setItem('pmp_pass',p)
unlocked=true
document.getElementById('systemBody').style.display='block'
document.getElementById('lockStatus').textContent='Unlocked'
}

function useToken(){
TOKEN=document.getElementById('tok').value.trim()
document.getElementById('tok').value=''
status('Token loaded')
}

function status(t,e){
let s=document.getElementById('status')
s.className=e?'warn':'note'
s.textContent=t
}

function api(){
if(!TOKEN)throw 'No token'
return {
Authorization:'Bearer '+TOKEN,
Accept:'application/vnd.github+json'
}
}

async function fetchFile(){
try{
status('Fetching...')
let [owner,repo]=document.getElementById('repo').value.split('/')
let path=document.getElementById('path').value
let branch=document.getElementById('branch').value

let r=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`,{headers:api()})
let j=await r.json()
if(!r.ok)throw j.message

let txt=atob(j.content)
document.getElementById('fileBox').value=txt
document.getElementById('fileBox').dataset.sha=j.sha

status('Fetched')
}catch(e){status(e,1)}
}

async function commitFile(){
try{
status('Committing...')
let [owner,repo]=document.getElementById('repo').value.split('/')
let path=document.getElementById('path').value
let branch=document.getElementById('branch').value
let txt=document.getElementById('fileBox').value
let sha=document.getElementById('fileBox').dataset.sha

let content=btoa(unescape(encodeURIComponent(txt)))

let r=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`,{
method:'PUT',
headers:{...api(),'Content-Type':'application/json'},
body:JSON.stringify({
message:'Bridge update',
content,
sha,
branch
})
})

let j=await r.json()
if(!r.ok)throw j.message

status('Committed ✔')
}catch(e){status(e,1)}
}
</script>

</body>
</html>

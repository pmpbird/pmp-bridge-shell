<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><title>Private Writer</title><style>body{margin:0;background:#52b5df;color:#101827;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.wrap{max-width:820px;margin:auto;padding:18px 14px 92px}.card{background:#46a9d3;border:2px solid #fff;border-radius:24px;padding:18px;margin:0 0 14px}h1{margin:0 0 8px;font-size:30px}h2{margin:0 0 10px;font-size:22px}.sub{color:#2f5363;font-weight:700;line-height:1.35}input,textarea,select{width:100%;box-sizing:border-box;border:1px solid #25354a;border-radius:16px;background:#0c141e;color:#eef4fb;padding:13px;font:inherit;margin-top:10px}textarea{min-height:220px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.mini{border:1px solid #25354a;background:#172234;color:#eef4fb;border-radius:14px;padding:12px;font:inherit;font-weight:800;margin-top:10px}.ok{background:#14532d}.danger{background:#4a1c1c}.note{background:#123024;border:1px solid #245c45;color:#bff3d2;border-radius:16px;padding:12px;white-space:pre-wrap;margin-top:10px}.warn{background:#2b2010;border:1px solid #745522;color:#ffe0a3;border-radius:16px;padding:12px;white-space:pre-wrap;margin-top:10px}.vault{min-height:300px}</style></head><body><div class="wrap"><div class="card"><h1>Private GitHub Writer</h1><p class="sub">Private side. Token stays in this page session unless you save it in the encrypted vault.</p><h2>Token Vault</h2><input id="name" placeholder="Token name" value="Bridge Shell Writer"><input id="purpose" placeholder="Purpose" value="Writes pmp-bridge-shell/index.html"><input id="pass" type="password" placeholder="Vault password"><select id="saved"></select><div class="grid"><button class="mini ok" onclick="saveToken()">Save Token</button><button class="mini" onclick="unlockToken()">Unlock Token</button><button class="mini danger" onclick="deleteToken()">Delete Token</button><button class="mini" onclick="renderTokens()">Refresh</button></div><div id="list" class="note">No saved tokens yet.</div><input id="tok" type="password" placeholder="Paste token here"><div class="grid"><button class="mini" onclick="useToken()">Use Pasted Token</button><button class="mini" onclick="clearActive()">Clear Active Token</button></div></div><div class="card"><h2>Repo Target</h2><input id="repo" value="pmpbird/pmp-bridge-shell"><input id="branch" value="main"><input id="path" value="index.html"><input id="msg" value="Private writer update"><input id="sha" readonly placeholder="file SHA"><div class="grid"><button class="mini" onclick="testToken()">Test</button><button class="mini" onclick="fetchFile()">Fetch</button><button class="mini ok" onclick="commitFile()">Commit</button><button class="mini danger" onclick="clearBoxes()">Clear Boxes</button></div><textarea id="text" class="vault" placeholder="Fetched/edited file appears here"></textarea><div id="status" class="note">Ready.</div></div></div><script>let T='',VK='pmp_private_writer_tokens_v1';const $=i=>document.getElementById(i);function S(m,b){let e=$('status');e.className=b?'warn':'note';e.textContent=m}function read(){try{return JSON.parse(localStorage.getItem(VK)||'[]')}catch(e){return[]}}function write(v){localStorage.setItem(VK,JSON.stringify(v||[]));renderTokens()}function slug(s){return String(s||'token').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'')||'token'}function b64(a){return btoa(String.fromCharCode(...new Uint8Array(a)))}function ub64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}async function key(p,salt){let enc=new TextEncoder(),base=await crypto.subtle.importKey('raw',enc.encode(p),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:150000,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['encrypt','decrypt'])}function renderTokens(){let a=read(),sel=$('saved');sel.innerHTML=a.map(x=>'<option value="'+x.id+'">'+(x.name||x.id)+'</option>').join('');$('list').textContent=a.length?a.map(x=>(x.name||x.id)+'\nPurpose: '+(x.purpose||'')+'\nTarget: '+(x.target?.repo||'')+' '+(x.target?.path||'')+'\nLast used: '+(x.last_used||'never')).join('\n\n'):'No saved tokens yet.'}function headers(){if(!T)throw Error('Use or unlock token first');return{Authorization:'Bearer '+T,Accept:'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'}}function target(){let [owner,repo]=$('repo').value.trim().split('/');return{owner,repo,branch:$('branch').value.trim(),path:$('path').value.trim()}}function apiUrl(){let t=target();return 'https://api.github.com/repos/'+encodeURIComponent(t.owner)+'/'+encodeURIComponent(t.repo)+'/contents/'+t.path.split('/').map(encodeURIComponent).join('/')}function encText(s){return btoa([...new TextEncoder().encode(s)].map(x=>String.fromCharCode(x)).join(''))}function decText(s){return new TextDecoder().decode(Uint8Array.from(atob((s||'').replace(/\n/g,'')),c=>c.charCodeAt(0)))}window.useToken=()=>{let x=$('tok').value.trim();if(!x)return S('Paste token first.',1);T=x;$('tok').value='';S('Token loaded for this open page.')} ;window.saveToken=async()=>{try{let x=T||$('tok').value.trim(),p=$('pass').value;if(!x)return S('Paste/use token first.',1);if(!p)return S('Enter vault password.',1);let salt=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12)),k=await key(p,salt),ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},k,new TextEncoder().encode(x)),name=$('name').value.trim()||'Bridge Shell Writer',id=slug(name),a=read().filter(v=>v.id!==id);a.push({id,name,purpose:$('purpose').value.trim(),target:target(),salt:b64(salt),iv:b64(iv),ct:b64(ct),saved_at:new Date().toISOString(),last_used:null});write(a);T=x;$('tok').value='';$('pass').value='';S('Saved encrypted token: '+name)}catch(e){S('Save failed: '+e.message,1)}};window.unlockToken=async()=>{try{let id=$('saved').value,p=$('pass').value,a=read(),it=a.find(x=>x.id===id);if(!it)return S('Select token first.',1);if(!p)return S('Enter vault password.',1);let k=await key(p,ub64(it.salt)),plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:ub64(it.iv)},k,ub64(it.ct));T=new TextDecoder().decode(plain);if(it.target){$('repo').value=it.target.owner+'/'+it.target.repo;$('branch').value=it.target.branch||'main';$('path').value=it.target.path||'index.html'}it.last_used=new Date().toISOString();write(a);$('pass').value='';S('Unlocked '+(it.name||it.id)+'.')}catch(e){S('Unlock failed. Wrong password or damaged vault.',1)}};window.deleteToken=()=>{let id=$('saved').value;if(!id)return;write(read().filter(x=>x.id!==id));S('Deleted saved token.')} ;window.clearActive=()=>{T='';$('tok').value='';S('Active token cleared. Saved vault unchanged.')};async function getFile(){let t=target(),r=await fetch(apiUrl()+'?ref='+encodeURIComponent(t.branch),{headers:headers(),cache:'no-store'}),j=await r.json().catch(()=>({}));if(!r.ok)throw Error(j.message||'Fetch failed');return j}window.testToken=async()=>{try{S('Testing...');let j=await getFile();$('sha').value=j.sha||'';S('Token works. File found.')}catch(e){S('Test failed: '+e.message,1)}};window.fetchFile=async()=>{try{S('Fetching...');let j=await getFile();$('sha').value=j.sha||'';$('text').value=decText(j.content);S('Fetched current file.')}catch(e){S('Fetch failed: '+e.message,1)}};window.commitFile=async()=>{try{let txt=$('text').value;if(!txt)return S('Nothing to commit.',1);let sha=$('sha').value.trim();if(!sha){let j=await getFile();sha=j.sha;$('sha').value=sha}let t=target(),r=await fetch(apiUrl(),{method:'PUT',headers:{...headers(),'Content-Type':'application/json'},body:JSON.stringify({message:$('msg').value||'Private writer update',content:encText(txt),sha,branch:t.branch})}),j=await r.json().catch(()=>({}));if(!r.ok)throw Error(j.message||'Commit failed');$('sha').value=j.content?.sha||'';S('Committed. Reload the app to see changes.')}catch(e){S('Commit failed: '+e.message,1)}};window.clearBoxes=()=>{$('text').value='';$('sha').value='';S('File box cleared.')};renderTokens();</script></body></html>

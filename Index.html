<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>game for the kids</title>
  <style>
    :root {
      --bg: #000;
      --fg: #fff;
      --border: rgba(255,255,255,0.25);
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    body.light {
      --bg: #fff;
      --fg: #000;
      --border: rgba(0,0,0,0.22);
    }
    .screen {
      position: fixed;
      inset: 0;
      display: none;
      background: var(--bg);
      color: var(--fg);
    }
    .screen.active { display: block; }
    .wrap {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 16px;
      padding: 24px;
    }
    .label {
      text-align: center;
      font-size: 18px;
    }
    button {
      width: 100%;
      min-height: 64px;
      font-size: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--fg);
      border-radius: 14px;
      -webkit-appearance: none;
      appearance: none;
    }
    button.selected {
      border-width: 3px;
    }
    #status {
      text-align: center;
      min-height: 24px;
      font-size: 16px;
      opacity: 0.85;
    }
    #workspaceTap {
      position: fixed;
      inset: 0;
      background: var(--bg);
    }
    #workspaceMessage {
      position: fixed;
      left: 20px;
      right: 20px;
      top: 24px;
      text-align: center;
      font-size: 16px;
      opacity: 0.8;
      pointer-events: none;
    }
    #inputWrap {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 0 16px calc(env(safe-area-inset-bottom, 0px) + 10px);
      display: none;
      background: var(--bg);
    }
    #inputWrap.open { display: block; }
    input {
      width: 100%;
      font-size: 20px;
      border: none;
      border-bottom: 1px solid var(--fg);
      outline: none;
      background: transparent;
      color: var(--fg);
      padding: 12px 2px 10px;
      border-radius: 0;
      -webkit-appearance: none;
      appearance: none;
    }
  </style>
</head>
<body>
  <section id="menuScreen" class="screen active">
    <div class="wrap">
      <div class="label">Menu</div>
      <button id="blackButton" class="selected" type="button">Black</button>
      <button id="whiteButton" type="button">White</button>
      <div id="status">Current color: black</div>
      <button id="continueButton" type="button">Continue</button>
    </div>
  </section>

  <section id="workspaceScreen" class="screen">
    <div id="workspaceTap"></div>
    <div id="workspaceMessage">Tap anywhere</div>
    <div id="inputWrap">
      <input id="commandInput" type="text" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" />
    </div>
  </section>

  <script>
    const body = document.body;
    const menuScreen = document.getElementById('menuScreen');
    const workspaceScreen = document.getElementById('workspaceScreen');
    const blackButton = document.getElementById('blackButton');
    const whiteButton = document.getElementById('whiteButton');
    const continueButton = document.getElementById('continueButton');
    const statusLine = document.getElementById('status');
    const workspaceTap = document.getElementById('workspaceTap');
    const workspaceMessage = document.getElementById('workspaceMessage');
    const inputWrap = document.getElementById('inputWrap');
    const commandInput = document.getElementById('commandInput');

    let currentColor = 'black';

    function setColor(color) {
      currentColor = color;
      const light = color === 'white';
      body.classList.toggle('light', light);
      blackButton.classList.toggle('selected', !light);
      whiteButton.classList.toggle('selected', light);
      statusLine.textContent = 'Current color: ' + color;
    }

    function openWorkspace() {
      menuScreen.classList.remove('active');
      workspaceScreen.classList.add('active');
      workspaceMessage.textContent = 'Tap anywhere';
      inputWrap.classList.remove('open');
      commandInput.value = '';
    }

    function openKeyboard() {
      inputWrap.classList.add('open');
      workspaceMessage.textContent = 'Keyboard opened';
      setTimeout(() => commandInput.focus(), 50);
    }

    blackButton.onclick = () => setColor('black');
    whiteButton.onclick = () => setColor('white');
    continueButton.onclick = openWorkspace;
    workspaceTap.onclick = openKeyboard;

    commandInput.addEventListener('blur', () => {
      if (commandInput.value.trim() === '') {
        inputWrap.classList.remove('open');
        workspaceMessage.textContent = 'Tap anywhere';
      }
    });

    setColor('black');
  </script>
</body>
</html>

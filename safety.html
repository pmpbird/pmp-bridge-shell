<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PMP Safety Links</title>
<style>
body{margin:0;background:#52b5df;color:#101827;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.wrap{max-width:760px;margin:auto;padding:18px}.card{background:#46a9d3;border:2px solid #fff;border-radius:28px;padding:18px;margin:0 0 16px}h1{margin:0 0 10px;font-size:34px}a{display:block;background:#a1fcfd;color:#101827;text-decoration:none;border-radius:20px;padding:18px;margin:12px 0;font-weight:900;font-size:19px}.note{background:#123024;border:2px solid #fff;color:#c9f7d7;border-radius:22px;padding:16px;white-space:pre-wrap}.warn{background:#2b2010;border:2px solid #745522;color:#ffe0a3;border-radius:22px;padding:16px;white-space:pre-wrap;margin-top:12px}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>PMP Safety Links</h1>
    <a href="safe-writer.html">Safe Writer</a>
    <a href="restore.html">Emergency Restore</a>
    <a href="pmp.html">Open PMP App</a>
    <div class="note">Safe Writer is for protected app edits only.
Emergency Restore is for broken-app recovery only.
Open PMP App returns to the main app.</div>
    <div class="warn" id="safetyPolicy"></div>
  </div>
</div>
<script>
const PMP_SAFETY_LAYER_POLICY={
  name:'Small Fixed Safety Layer',
  fixed_tools:['safe-writer.html','restore.html','safety.html'],
  rule:'No new pages or safety tools unless a real need appears.',
  use_existing_systems_first:true,
  safe_writer_role:'protected app edits only',
  emergency_restore_role:'broken-app recovery only',
  safety_hub_role:'doorway to fixed safety tools only'
};
document.getElementById('safetyPolicy').textContent=[
  PMP_SAFETY_LAYER_POLICY.name,
  PMP_SAFETY_LAYER_POLICY.rule,
  'Fixed tools: '+PMP_SAFETY_LAYER_POLICY.fixed_tools.join(', '),
  'Use existing PMP / Bridge systems first.'
].join('\n');
</script>
</body>
</html>

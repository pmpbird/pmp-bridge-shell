<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="PMP Bridge"><meta name="pmp-permanent-app" content="pmp.html"><meta name="pmp-upgrade-policy" content="same-path-upgrades-only"><title>PMP Bridge</title><style>:root{--a:#a1fcfd;--a2:#7ed9da;--a3:#56b1b2;--a4:#92edee;--bg:#52b5df;--card:#46a9d3;--line:#ffffff;--text:#101827;--muted:#234a5d;--bt:#101827}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.wrap{max-width:820px;margin:auto;padding:18px 14px 96px}.screen{display:none}.screen.on{display:block}.card{background:var(--card);border:2px solid var(--line);border-radius:28px;padding:18px;margin:0 0 16px;box-shadow:0 12px 28px rgba(0,0,0,.10),inset 0 0 0 1px rgba(255,255,255,.08)}h1{margin:0 0 10px;font-size:34px;letter-spacing:-.5px}h2{margin:0 0 12px;font-size:24px}.sub{color:var(--muted);font-weight:800;line-height:1.35}.big{display:flex;align-items:center;gap:14px;width:100%;border:0;border-radius:20px;padding:18px;margin:12px 0;color:var(--bt);background:var(--a);text-align:left;font:inherit;font-weight:900;font-size:19px;box-shadow:0 8px 18px rgba(0,0,0,.12)}.big small{display:block;font-size:14px;font-weight:600;opacity:.9}.icon{font-size:28px;width:38px;text-align:center}.chev{margin-left:auto;font-size:32px}.green{background:var(--a2)}.gold{background:var(--a3)}.teal{background:var(--a4)}input,textarea,select{width:100%;border:1px solid #25354a;border-radius:16px;background:#0c141e;color:#eef4fb;padding:13px;font:inherit;margin-top:10px}textarea{min-height:135px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px}.mini{border:1px solid #25354a;background:#172234;color:#eef4fb;border-radius:14px;padding:14px;font:inherit;font-weight:900;width:100%;margin-top:10px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.row{display:grid;grid-template-columns:125px 1fr;gap:8px}.note{background:#123024;border:2px solid var(--line);color:#c9f7d7;border-radius:22px;padding:16px;white-space:pre-wrap}.code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;white-space:pre-wrap;overflow-wrap:anywhere;font-size:13px}.tabs{position:fixed;left:0;right:0;bottom:0;background:rgba(15,22,32,.96);border-top:1px solid #25354a;display:grid;grid-template-columns:repeat(4,1fr);padding:7px 6px max(7px,env(safe-area-inset-bottom));z-index:10}.tab{background:transparent;border:0;color:#9fb0c3;font:inherit;font-size:12px}.tab b{display:block;font-size:21px}.tab.on{color:var(--a);font-weight:900}.color-select{position:relative;display:grid;grid-template-columns:56px 1fr;gap:14px;align-items:center;min-height:78px;border:2px solid var(--line);border-radius:22px;background:#101a28;color:#eef4fb;padding:14px;margin:10px 0}.color-select small{display:block;color:#9fb0c3;font-size:14px;margin-top:4px}.dot{width:52px;height:52px;border-radius:50%;border:4px solid rgba(255,255,255,.9);background:var(--a);box-shadow:0 0 0 5px rgba(255,255,255,.08),0 8px 22px rgba(0,0,0,.35)}.bgdot{background:var(--bg)}.linedot{background:var(--line)}.color-select input[type=color]{position:absolute;inset:0;width:100%;height:100%;opacity:.001;margin:0;padding:0;border:0}.range-box{border:2px solid var(--line);border-radius:22px;background:#101a28;color:#eef4fb;padding:14px;margin:10px 0}.range-box label{display:flex;justify-content:space-between;font-weight:900}.range-box input[type=range]{accent-color:var(--line);margin-top:12px}.hidden{display:none!important}</style></head><body><div class="wrap"><section id="home" class="screen on"><div class="card"><h1 id="appTitle">PMP Bridge</h1><button class="big" onclick="improveLossless()"><span class="icon">↟</span><span>Improve Lossless Quality<small>Update status and next move</small></span><span class="chev">›</span></button><button class="big green" onclick="prepareExport()"><span class="icon">◇</span><span>Prepare Project Export<small>Build carried-state bundle</small></span><span class="chev">›</span></button><button class="big teal" onclick="copyCurrent()"><span class="icon">⧉</span><span>Copy Current<small>Copy current output</small></span><span class="chev">›</span></button></div><div class="card"><h2>Color</h2><label class="color-select"><span class="dot" id="buttonDot"></span><span><strong>Button Color</strong><small>Changes buttons and selected tab</small></span><input id="buttonPicker" type="color" value="#a1fcfd" oninput="setButtonColor(this.value)"></label><label class="color-select"><span class="dot bgdot" id="bgDot"></span><span><strong>Background Color</strong><small>Changes app background and cards</small></span><input id="bgPicker" type="color" value="#52b5df" oninput="setBgColor(this.value)"></label><label class="color-select"><span class="dot linedot" id="lineDot"></span><span><strong>Line Color</strong><small>Changes public shell lines</small></span><input id="linePicker" type="color" value="#ffffff" oninput="setLineColor(this.value)"></label><div class="range-box"><label><span>Text Contrast</span><span id="contrastValue">85%</span></label><input id="contrastSlider" type="range" min="0" max="100" value="85" oninput="setTextContrast(this.value)"></div></div></section><section id="workbench" class="screen"><div class="card"><h1>WORKBENCH</h1><h2>Project Connections</h2><label class="sub" for="projectId">Active Project</label><input id="projectId" value="pmp" oninput="persistProject()"><label class="sub" for="projectSelect" style="display:block;margin-top:12px">Connected Project IDs</label><select id="projectSelect" onchange="switchProject(this.value)"></select><div class="grid"><button class="mini" onclick="saveProjectConnection()">Save / Connect Project</button><button class="mini" onclick="copyProjectState()">Copy Project State</button></div></div><div class="card"><h2>Connected Projects</h2><div id="projectList" class="note">pmp — active</div></div><div class="card"><h2>Import / Connect Project State</h2><textarea id="projectImport" placeholder="Paste project state / transfer packet here"></textarea><div class="grid"><button class="mini" onclick="importProjectState()">Import / Connect</button><button class="mini" onclick="clearProjectImport()">Clear</button></div><div id="connectStatus" class="note" style="margin-top:10px">Ready.</div></div><div class="card"><h2>Project State Overview</h2><div id="stateOverview" class="row"></div></div></section><section id="share" class="screen"><div class="card"><h1>SHARE</h1><label class="sub">Receiver</label><input id="receiver" value="pmp"><label class="sub" style="display:block;margin-top:12px">Payload</label><textarea id="payload" placeholder="Paste or type information to send"></textarea><label class="sub" style="display:block;margin-top:12px">Info Base</label><textarea id="infobase" placeholder="What this is&#10;How to use it&#10;What not to overwrite"></textarea><div class="grid"><button class="mini" onclick="buildShare()">Build Share Packet</button><button class="mini" onclick="copyShare()">Copy Share Packet</button></div><textarea id="shareOut" readonly class="hidden"></textarea></div></section><section id="loader" class="screen"><div class="card"><h1>LOADER</h1><p class="sub">Public update packets and app checks</p><textarea id="upgradeBox" placeholder="Paste upgrade packet JSON here"></textarea><div class="grid"><button class="mini" onclick="applyUpdate()">Apply Update Packet</button><button class="mini" onclick="showHistory()">History</button><button class="mini" onclick="copyAppBackup()">Copy App Data Backup</button><button class="mini" onclick="runSelfTest()">Run Self Test</button></div><button class="mini" onclick="clearHistory()">Clear History</button><h2>Status</h2><div id="loaderStatus" class="note">Ready.</div><div id="historyBox" class="note hidden" style="margin-top:10px"></div></div></section><section id="system" class="screen"><div class="card"><h1>SYSTEM</h1><div id="lockBox"><h2>System Lock</h2><input id="privatePass" type="password" placeholder="password"><button class="mini" onclick="unlockPrivate()">Unlock</button><div id="lockStatus" class="note" style="margin-top:10px">locked</div></div><div id="privateMenu" class="hidden"><h2>Private Menu</h2><button class="big" onclick="privateNote('Bug Memory')"><span>Bug Memory</span><span class="chev">›</span></button><button class="big" onclick="privateNote('Private Token Writer')"><span>Private Token Writer</span><span class="chev">›</span></button><button class="big" onclick="privateNote('Private Backups')"><span>Private Backups</span><span class="chev">›</span></button><h2>Status</h2><div id="privateStatus" class="note">unlocked</div></div></div></section></div><nav class="tabs"><button class="tab on" data-tab="home" onclick="go('home')"><b>⌂</b>Home</button><button class="tab" data-tab="workbench" onclick="go('workbench')"><b>▦</b>Workbench</button><button class="tab" data-tab="share" onclick="go('share')"><b>✉</b>Share</button><button class="tab" data-tab="loader" onclick="go('loader')"><b>⬆</b>Loader</button></nav><script>const PMP_PERMANENT_APP_LOCK={stable_path:'pmp.html',upgrade_policy:'same path only',do_not_replace_home_screen_app:true};const K={btn:'pmp_btn_v5',bg:'pmp_bg_v5',line:'pmp_line_v5',muted:'pmp_text_v5',state:'pmp_state_v5',projects:'pmp_projects_v5',hist:'pmp_hist_v5',pass:'pmp_private_pass_v1'};const $=id=>document.getElementById(id);let taps=0,lastTap=0,currentOutput='';function now(){return new Date().toISOString()}function read(k,f){try{let v=localStorage.getItem(k);return v?JSON.parse(v):f}catch(e){return f}}function write(k,v){localStorage.setItem(k,JSON.stringify(v))}function css(k,v){document.documentElement.style.setProperty(k,v)}function lum(h){h=String(h||'#000').replace('#','');let n=parseInt(h,16);return .2126*(n>>16)+.7152*(n>>8&255)+.0722*(n&255)}function textFor(h){return lum(h)>150?'#101827':'#eef4fb'}function shade(h,a){h=String(h||'#000').replace('#','');let n=parseInt(h,16);if(isNaN(n))n=0;let r=(n>>16)+a,g=(n>>8&255)+a,b=(n&255)+a;r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));return '#'+(b|g<<8|r<<16).toString(16).padStart(6,'0')}function contrastColor(bg,v){v=Number(v);let light=lum(bg)>150,amt=Math.round(45+(v*.9));return light?shade(bg,-amt):shade(bg,amt)}function setButtonColor(h){write(K.btn,h);css('--a',h);css('--a2',shade(h,-35));css('--a3',shade(h,-75));css('--a4',shade(h,-15));css('--bt',textFor(h));if($('buttonPicker'))$('buttonPicker').value=h;if($('buttonDot'))$('buttonDot').style.background=h}function setBgColor(h){write(K.bg,h);css('--bg',h);css('--card',lum(h)>150?shade(h,-12):shade(h,18));css('--text',textFor(h));if($('bgPicker'))$('bgPicker').value=h;if($('bgDot'))$('bgDot').style.background=h;setTextContrast(read(K.muted,85))}function setLineColor(h){write(K.line,h);css('--line',h);if($('linePicker'))$('linePicker').value=h;if($('lineDot'))$('lineDot').style.background=h}function setTextContrast(v){v=Number(v);write(K.muted,v);css('--muted',contrastColor(read(K.bg,'#52b5df'),v));if($('contrastValue'))$('contrastValue').textContent=v+'%';if($('contrastSlider'))$('contrastSlider').value=v}function defState(id='pmp'){return{project_id:id,state:'PASS',gaps:0,ready:'public-side ready',next:'...'}}function state(){return read(K.state,defState())}function saveState(s){write(K.state,s);saveProjectConnection(false);render()}function projects(){let p=read(K.projects,{}),s=state();if(!p[s.project_id])p[s.project_id]=s;return p}function saveProjects(p){write(K.projects,p)}function go(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));$(id).classList.add('on');document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.tab===id));render();scrollTo(0,0)}function render(){let s=state(),p=projects(),ids=Object.keys(p).sort();if($('projectId'))$('projectId').value=s.project_id;if($('receiver'))$('receiver').value=s.project_id;if($('projectSelect'))$('projectSelect').innerHTML=ids.map(id=>`<option value="${esc(id)}" ${id===s.project_id?'selected':''}>${esc(id)}</option>`).join('');if($('projectList'))$('projectList').textContent=ids.map(id=>`${id} — ${id===s.project_id?'active':'connected'}`).join('\n');if($('stateOverview'))$('stateOverview').innerHTML=`<div>State</div><div>${esc(s.state)}</div><div>Gaps</div><div>${esc(s.gaps)}</div><div>Ready</div><div>${esc(s.ready)}</div><div>Next</div><div>${esc(s.next)}</div>`}function esc(s){return String(s).replace(/[&<>'\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}function persistProject(){let s=state();s.project_id=$('projectId').value.trim()||'pmp';saveState(s)}function saveProjectConnection(show=true){let s=state(),p=read(K.projects,{});p[s.project_id]=s;saveProjects(p);if(show&&$('connectStatus'))$('connectStatus').textContent='Project saved/connected: '+s.project_id}function switchProject(id){let p=projects();if(p[id]){write(K.state,p[id]);render()}}function importProjectState(){let raw=$('projectImport').value.trim();if(!raw)return $('connectStatus').textContent='Paste project state first.';let obj;try{obj=JSON.parse(raw)}catch(e){return $('connectStatus').textContent='Import must be JSON.'}let s=obj.state||obj.project_state||obj.current_state||obj;s={...defState(s.project_id||obj.project_state_id||'imported_project'),...s};let p=projects();p[s.project_id]=s;saveProjects(p);write(K.state,s);$('projectImport').value='';$('connectStatus').textContent='Connected project: '+s.project_id;render()}function clearProjectImport(){$('projectImport').value='';$('connectStatus').textContent='Cleared.'}async function copyProjectState(){let packet={type:'PMP_PROJECT_STATE_V1',built_at:now(),state:state()};await navigator.clipboard.writeText(JSON.stringify(packet,null,2));alert('Project state copied')}function improveLossless(){let s=state();s.state='PASS';s.gaps=0;s.ready='public-side ready';s.next='review export';currentOutput=JSON.stringify({type:'PMP_LOSSLESS_STATUS_V1',built_at:now(),state:s},null,2);saveState(s)}function prepareExport(){currentOutput=JSON.stringify({type:'PMP_PROJECT_EXPORT_V1',built_at:now(),state:state(),projects:projects()},null,2);alert('Export prepared. Tap Copy Current.')}async function copyCurrent(){await navigator.clipboard.writeText(currentOutput||JSON.stringify({state:state(),projects:projects()},null,2));alert('Copied')}function buildShare(){let packet={type:'PMP_SHARE_PACKET_V1',built_at:now(),receiver:$('receiver').value,payload:$('payload').value,info_base:$('infobase').value};$('shareOut').classList.remove('hidden');$('shareOut').value=JSON.stringify(packet,null,2)}async function copyShare(){if(!$('shareOut').value)buildShare();await navigator.clipboard.writeText($('shareOut').value);alert('Share packet copied')}function applyUpdate(){let raw=$('upgradeBox').value.trim();if(!raw)return $('loaderStatus').textContent='Paste update packet first.';write(K.hist,[{at:now(),packet:raw},...read(K.hist,[])]);$('loaderStatus').textContent='Update packet saved to history.';$('upgradeBox').value=''}function showHistory(){let h=read(K.hist,[]);$('historyBox').classList.remove('hidden');$('historyBox').textContent=h.length?h.map((x,i)=>`${i+1}. ${x.at}`).join('\n'):'No history yet.'}async function copyAppBackup(){await navigator.clipboard.writeText(JSON.stringify({type:'PMP_APP_BACKUP_V1',state:state(),projects:projects(),history:read(K.hist,[])},null,2));alert('Backup copied')}function runSelfTest(){$('loaderStatus').textContent='Ready. Self test passed.'}function clearHistory(){write(K.hist,[]);$('loaderStatus').textContent='History cleared.'}async function hash(t){let b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(t));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}async function unlockPrivate(){let p=$('privatePass').value;if(!p)return $('lockStatus').textContent='Enter password.';let saved=read(K.pass,null),h=await hash(p);if(!saved){write(K.pass,h);saved=h}if(h===saved){$('lockBox').classList.add('hidden');$('privateMenu').classList.remove('hidden');$('privatePass').value=''}else $('lockStatus').textContent='Wrong password.'}function privateNote(name){$('privateStatus').textContent=name+' selected. Tool not loaded yet.'}function titleTap(){let t=Date.now();if(t-lastTap>2200)taps=0;lastTap=t;taps++;if(taps>=7){taps=0;go('system')}}$('appTitle').addEventListener('click',titleTap);setButtonColor(read(K.btn,'#a1fcfd'));setBgColor(read(K.bg,'#52b5df'));setLineColor(read(K.line,'#ffffff'));setTextContrast(read(K.muted,85));saveProjectConnection(false);render();</script></body></html>
